# https://kserve.github.io/website/docs/model-serving/generative-inference/llmisvc/llmisvc-configuration#prefill-decode-separation-configuration

apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: SET_AT_RUNTIME
  namespace: SET_AT_RUNTIME
  annotations:
    security.opendatahub.io/enable-auth: 'false'
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
spec:
  replicas: 1
  model:
    uri: pvc://storage-rwx/gpt-oss-120
    name: openai/gpt-oss-120b
  router:
    scheduler:
      template:
        containers:
          - name: main
            # image: 'ghcr.io/llm-d/llm-d-inference-scheduler:v0.6.0'
            args:
              - --cert-path
              - /var/run/kserve/tls
              - --pool-group
              - inference.networking.x-k8s.io
              - '--pool-name'
              - '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              - '--pool-namespace'
              - '{{ .ObjectMeta.Namespace }}'
              - '--zap-encoder'
              - json
              - '--grpc-port'
              - '9002'
              - '--grpc-health-port'
              - '9003'
              - '--secure-serving'
              - '--model-server-metrics-scheme'
              - https

              - '--kv-cache-usage-percentage-metric'
              - vllm:kv_cache_usage_perc

              - '--config-text'
        volumes:
          - name: tokenizer-cache
            emptyDir: {}
          - name: cachi2-cache
            emptyDir: {}
        nodeSelector:
          nvidia.com/gpu.present: "true"
    route: {}
    gateway: {}
  template:
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    containers:
      - name: main
        env:
        - name: VLLM_ADDITIONAL_ARGS
          value: >-
            --block-size 128 --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'

        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        # - name: UCX_LOG_LEVEL
        #   value: debug
        # - name: UCX_PROTO_INFO
        #   value: "1"
        resources:
          limits:
            nvidia.com/gpu: "1"
            rdma/ib: "1"
          requests:
            rdma/ib: "1"
            cpu: '4'
            memory: 8Gi
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 900
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 1000
        readinessProbe:
          failureThreshold: 10000
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 30
 # Prefill workload (separate pool)
  prefill:
    replicas: 2
    template:
      containers:
      - name: main
        env:
        - name: VLLM_ADDITIONAL_ARGS
          value: >-
             --disable-uvicorn-access-log
             --block-size 128
             --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        # - name: UCX_LOG_LEVEL
        #   value: debug
        # - name: UCX_PROTO_INFO
        #   value: "1"
        resources:
          limits:
            nvidia.com/gpu: "1"
            rdma/ib: "1"
          requests:
            rdma/ib: "1"
            cpu: '4'
            memory: 64Gi
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 900
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 1000
        readinessProbe:
          failureThreshold: 10000
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 30
