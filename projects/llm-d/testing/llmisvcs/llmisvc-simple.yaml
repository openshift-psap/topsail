apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: SET_AT_RUNTIME
  namespace: SET_AT_RUNTIME
  annotations:
    security.opendatahub.io/enable-auth: 'false'
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
spec:
  replicas: 1
  model:
    uri: oci://registry.redhat.io/rhelai1/modelcar-llama-3-1-8b-instruct-fp8-dynamic:1.5
    name: llama-3-1-8b-instruct-fp8
  router:
    scheduler:
      template:
        nodeSelector:
          nvidia.com/gpu.present: "true"
    route: {}
    gateway: {}
  template:
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    containers:
      - name: main
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            cpu: '4'
            memory: 8Gi
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 900
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 1000
        readinessProbe:
          failureThreshold: 10000
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 30
