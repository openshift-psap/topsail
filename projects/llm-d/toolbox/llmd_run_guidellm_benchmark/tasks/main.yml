---
- name: Create the src directory
  file:
    path: "{{ artifact_extra_logs_dir }}/src/"
    state: directory
    mode: '0755'

- name: Create the artifacts directory
  file:
    path: "{{ artifact_extra_logs_dir }}/artifacts/"
    state: directory
    mode: '0755'

- name: Get current namespace if not specified
  command: oc project -q
  register: current_namespace_result
  when: llmd_run_guidellm_benchmark_namespace == ""

- name: Set the target namespace
  set_fact:
    target_namespace: "{{ current_namespace_result.stdout if llmd_run_guidellm_benchmark_namespace == '' else llmd_run_guidellm_benchmark_namespace }}"

- name: Delete the old guidellm benchmark job and PVC
  command:
    oc delete job,pvc "{{ llmd_run_guidellm_benchmark_name }}" -n "{{ target_namespace }}" --ignore-not-found

- name: Create the guidellm benchmark PVC YAML
  template:
    src: "{{ guidellm_benchmark_pvc_template }}"
    dest: "{{ artifact_extra_logs_dir }}/src/guidellm_benchmark_pvc.yaml"
    mode: '0700'

- name: Create the guidellm benchmark PVC
  command:
    oc create -f "{{ artifact_extra_logs_dir }}/src/guidellm_benchmark_pvc.yaml"

- name: Set the benchmark endpoint URL
  set_fact:
    benchmark_endpoint_url: "{{ llmd_run_guidellm_benchmark_endpoint_url }}"

- name: Create the guidellm benchmark job YAML
  template:
    src: "{{ guidellm_benchmark_job_template }}"
    dest: "{{ artifact_extra_logs_dir }}/src/guidellm_benchmark_job.yaml"
    mode: '0700'

- name: Create the guidellm benchmark job
  command:
    oc create -f "{{ artifact_extra_logs_dir }}/src/guidellm_benchmark_job.yaml"

- name: Run guidellm benchmark and capture artifacts
  block:
  - name: Compute job timeout end time
    shell: echo $(($(date +%s) + {{ llmd_run_guidellm_benchmark_timeout }}))
    register: job_end_time_result

  - name: Get current time and end time for debug
    shell: |
      end_epoch={{ job_end_time_result.stdout }}
      current_human=$(date)
      end_human=$(date -d @$end_epoch)
      echo "Current: $current_human"
      echo "End: $end_human"
      echo "Timeout: {{ llmd_run_guidellm_benchmark_timeout }}s"

  - name: Wait for the guidellm benchmark job to complete or fail
    shell: |
      set -o pipefail;
      oc get job "{{ llmd_run_guidellm_benchmark_name }}" -n "{{ target_namespace }}" --no-headers | awk '{print $2; print "Job duration:", $4 > "/dev/stderr"}'
    register: job_status_result
    until: job_status_result.stdout in ['Complete', 'Failed']
    retries: 900
    delay: 30
    failed_when: false

  - name: Check final job status and fail if not completed successfully
    fail:
      msg: "Guidellm benchmark job failed or timed out (final status: {{ job_status_result.stdout }})"
    when: job_status_result.stdout != 'Complete'

  always:
  - name: Capture artifacts
    block:
    - name: Capture the final guidellm benchmark job YAML
      shell:
        oc get job "{{ llmd_run_guidellm_benchmark_name }}" -n "{{ target_namespace }}" -oyaml \
           > "{{ artifact_extra_logs_dir }}/artifacts/guidellm_benchmark_job.final.yaml"

    - name: Capture the guidellm benchmark job pods YAML
      shell:
        oc get pods -l "job-name={{ llmd_run_guidellm_benchmark_name }}" -n "{{ target_namespace }}" -oyaml \
           > "{{ artifact_extra_logs_dir }}/artifacts/guidellm_benchmark_job.pods.yaml"

    - name: Capture the guidellm benchmark job logs
      shell:
        oc logs job/{{ llmd_run_guidellm_benchmark_name }} -n "{{ target_namespace }}" \
           > "{{ artifact_extra_logs_dir }}/artifacts/guidellm_benchmark_job.logs"
    always:
    - name: Create the results subdirectory
      file:
        path: "{{ artifact_extra_logs_dir }}/artifacts/results/"
        state: directory
        mode: '0755'

    - name: Get the node where the GuideLLM job pod ran
      shell: |
        set -o pipefail;
        oc get pods -l "job-name={{ llmd_run_guidellm_benchmark_name }}" -n "{{ target_namespace }}" --no-headers -o custom-columns=":spec.nodeName" | head -1
      register: guidellm_node_result
      failed_when: false

    - name: Set the target node for helper pod
      set_fact:
        helper_pod_node: "{{ guidellm_node_result.stdout | trim }}"

    - name: Create the copy helper pod YAML
      template:
        src: "{{ copy_helper_pod_template }}"
        dest: "{{ artifact_extra_logs_dir }}/src/copy_helper_pod.yaml"
        mode: '0700'

    - name: Create the copy helper pod
      command:
        oc create -f "{{ artifact_extra_logs_dir }}/src/copy_helper_pod.yaml"

    - name: Retrieve the test results locally
      block:
      - name: Wait for copy helper pod to be ready
        shell: |
          oc wait --for=condition=Ready pod/{{ llmd_run_guidellm_benchmark_name }}-copy -n "{{ target_namespace }}" --timeout=60s

      - name: Copy benchmarks.json from PVC to artifacts directory
        shell: |
          oc exec {{ llmd_run_guidellm_benchmark_name }}-copy -n "{{ target_namespace }}" -- cat /results/benchmarks.json > "{{ artifact_extra_logs_dir }}/artifacts/results/benchmarks.json" 2>/dev/null || echo "Warning: benchmarks.json not found in PVC"
      always:
      - name: Delete the copy helper pod
        command:
          oc delete pod "{{ llmd_run_guidellm_benchmark_name }}-copy" -n "{{ target_namespace }}" --ignore-not-found

      - name: Delete the guidellm benchmark job
        command:
          oc delete job "{{ llmd_run_guidellm_benchmark_name }}" -n "{{ target_namespace }}" --ignore-not-found

      - name: Delete the guidellm benchmark PVC
        command:
          oc delete pvc "{{ llmd_run_guidellm_benchmark_name }}" -n "{{ target_namespace }}" --ignore-not-found
